services:
  - type: web
    name: ai-pharmacy-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: false
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_VERSION
        value: 20.x
      - key: DATABASE_URL
        sync: false # You must set your Aiven connection string securely in the Render dashboard
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a strong secret for signing JWTs
      - key: GEMINI_API_KEY
        sync: false # Set your Gemini API key in the Render dashboard
